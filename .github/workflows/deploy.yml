name: Node.js CI/CD pipeline

on:
  push :
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        id: checkout
      
      - name: setup nodejs for testing
        uses: actions/setup-node@v3
        id: setup-node-for-testing
        with:
          node-version: "20"
      
      - name: Install dependencies
        run: npm install
        id: install-dependencies-for-testing

      - name: Run tests
        run: npm test
        id: run-tests

      - name: setup aws cli
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      
      - name: Terraform setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"


      - name: Provision infrastructure using terraform
        id: provision
        run: |
          cd infrastructure
          terraform init
          terraform apply -auto-approve
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
      
      - name: Write EC2 SSH key to file
        run: |
          echo "${{secrets.EC2_SSH_KEY}}" > ec2_key.pem
          chmod 600 ec2_key.pem

          
      - name: Deploy on EC2
        env:
            EC2_IP: ${{ steps.provision.outputs.ec2_public_ip }}
            GH_USER: ${{ secrets.USER_NAME_GITHUB }}
            REPO: ${{ secrets.REPO_NAME }}
            PORT: ${{ secrets.PORT }}
            DOMAIN: ${{ secrets.DOMAIN }}
        run: |
            ssh -o StrictHostKeyChecking=no -i ec2_key.pem ubuntu@"$EC2_IP" << EOF
              set -e

              sudo apt-get update -y
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs git
              sudo npm i -g pm2

              cd /home/ubuntu

              if [ -d "$REPO/.git" ]; then
                cd "$REPO"
                git fetch --all
                git reset --hard origin/master
              else
                rm -rf "$REPO"
                git clone "https://github.com/$GH_USER/$REPO.git" "$REPO"
                cd "$REPO"
                git fetch --all
                git reset --hard origin/master
              fi

              # listing out files and directories for debugging purpose
              dir

              # write env fresh (no interactive editor)
              printf "PORT=%s\n" "$PORT" > .env

              npm ci || npm install
              pm2 delete "$REPO" || true
              pm2 start index.js --name "$REPO" --update-env
              pm2 save
              pm2 startup systemd -u ubuntu --hp /home/ubuntu | tail -n 1 | sudo bash

              # install nginx and configure it as reverse proxy
              sudo apt-get install -y nginx
              sudo rm -f /etc/nginx/sites-enabled/default

              # remove existing nginx configuration for the domain if exists
              if [ -f "/etc/nginx/sites-available/$DOMAIN" ]; then
                sudo rm -f /etc/nginx/sites-available/"$DOMAIN"
                sudo rm -f /etc/nginx/sites-enabled/"$DOMAIN"
              fi

              sudo tee /etc/nginx/sites-available/$DOMAIN>/dev/null <<NGINXCONFIG
              server {
                  listen 80;
                  server_name $DOMAIN;

                  location / {
                      proxy_pass http://localhost:$PORT;
                      proxy_http_version 1.1;
                      proxy_set_header Upgrade $http_upgrade;
                      proxy_set_header Connection 'upgrade';
                      proxy_set_header Host $host;
                      proxy_cache_bypass $http_upgrade;
                  }
              }
              `NGINXCONFIG'

              # create symbolic link for nginx configuration and restart nginx
              sudo ln -s /etc/nginx/sites-available/"$DOMAIN" /etc/nginx/sites-enabled/
              sudo nginx -t
              sudo systemctl restart nginx
            EOF